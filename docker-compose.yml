# version: "3.9"
services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: datingapp-db
    environment:
      SA_PASSWORD: "YourStrongPassword123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql

  webapp:
    build: 
      context: ./WebApp
      dockerfile: Dockerfile
    container_name: datingapp-web
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=dating-app-v1;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True"
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Development"
    depends_on:
      - db

volumes:
  sqldata: