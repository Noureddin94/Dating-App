services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: datingapp-db
    environment:
      SA_PASSWORD: "YourStrongPassword123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrongPassword123!' -Q 'SELECT 1' -No -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  webapp:
    build: 
      context: ./WebApp
      dockerfile: Dockerfile
    container_name: datingapp-web
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=dating-app-v1;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True"
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Development"
    depends_on:
      db:
        condition: service_healthy

volumes:
  sqldata: